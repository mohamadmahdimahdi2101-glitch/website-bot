<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>سپاسگزاری از مادرم</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-400 to-cyan-400 min-h-screen flex items-center justify-center p-8 font-vazirmatn text-white text-center" style="font-family: 'Vazirmatn', sans-serif;">
  <div class="bg-black bg-opacity-70 rounded-lg p-8 max-w-xl w-full shadow-lg hover:shadow-xl transition-shadow duration-300 relative">
    <div class="absolute top-4 right-4 animate-bounce text-4xl text-pink-500" aria-label="قلب تپنده">❤️</div>
    <h1 class="text-3xl font-extrabold mb-4">مادرم، سپاس بی‌کران</h1>
    <p class="mb-6 text-lg leading-relaxed text-cyan-100">
      بابت تمامی لحظات بی‌دریغ حمایتی که به من داده‌ای، بابت عشق بی‌پایان و فداکاری‌های بی‌وقفه‌ات، تو در قلب من جای داری و دوستت دارم.
    </p>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
      <img src="https://images.unsplash.com/photo-1549924231-f129b911e442?auto=format&fit=crop&w=800&q=80" alt="Mother and Child" class="rounded-lg shadow-lg hover:scale-105 transform transition-transform duration-300" />
      <img src="https://images.unsplash.com/photo-1524504388940-b1c1719f48ce?auto=format&fit=crop&w=800&q=80" alt="Family Love" class="rounded-lg shadow-lg hover:scale-105 transform transition-transform duration-300" />
    </div>
    <footer class="text-sm text-cyan-200">با عشق و احترام، فرزندت</footer>
  </div>
</body>
</html>
