<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تشکر ویژه از مادر عزیزم</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-yellow-100 via-yellow-200 to-yellow-300 text-brown-800 min-h-screen flex flex-col items-center justify-center p-4 font-vazirmatn">

  <header class="mb-8 text-center">
    <h1 class="text-4xl font-bold mb-4">مادر عزیزم، ممنونم از تو</h1>
  </header>

  <main class="flex flex-col items-center max-w-xl w-full text-center space-y-4">
    <img src="https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?auto=format&fit=crop&w=400&q=80" alt="عکس مادر" class="w-48 h-48 rounded-full object-cover border-4 border-yellow-300 shadow-lg" />
    <div class="bg-white bg-opacity-90 p-6 rounded-xl shadow-lg">
      <p class="text-lg leading-relaxed font-medium">
        ممنونم که همیشه کنارم بودی، حتی در سخت‌ترین لحظات.<br />
        عشق و مهربانی تو الهام‌بخش زندگی من است.<br />
        هیچ وقت نمی‌توانم تمام زحماتت را جبران کنم اما با تمام وجود دوستت دارم.
      </p>
    </div>
  </main>

  <footer class="mt-8 text-sm text-orange-700">
    <p>با عشق از طرف فرزندت ❤️</p>
  </footer>

</body>
</html>
