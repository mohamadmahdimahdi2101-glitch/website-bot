<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>بازی دونفره خاص</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazir&display=swap');
  body {
    font-family: 'Vazir', sans-serif;
    background-color: #0b0f19;
    color: #f3f4f6;
  }
</style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

<header class="text-center mb-6">
  <h1 class="text-4xl font-bold text-blue-400 mb-2 animate-bounce-slow">بازی دونفره خاص</h1>
  <p class="text-gray-300 text-lg">رقیب خود را چالش کن و لذت ببرید!</p>
</header>

<div class="relative w-full max-w-4xl aspect-[3/4] flex divide-x-2 divide-gray-700 shadow-2xl rounded-xl bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 overflow-hidden">
  <!-- سمت بازیکن X -->
  <div class="flex-1 flex flex-col items-center justify-start p-4 bg-gradient-to-tr from-blue-950 via-blue-800 to-blue-700 bg-opacity-70 backdrop-blur-lg">
    <div class="flex items-center mb-4 space-x-3">
      <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=100&q=80" alt="بازیکن X" class="w-16 h-16 rounded-full border-4 border-blue-400 shadow-lg transition-transform hover:scale-105">
      <div class="text-xl font-semibold text-white">بازیکن X</div>
    </div>
    <div id="playerX-score" class="text-3xl font-bold text-green-400 mb-2">امتیاز: 0</div>
    <div id="playerX-turn" class="text-lg text-gray-300 mb-4">نوبت است</div>
    <div class="w-full flex flex-col items-center space-y-2 mb-4">
      <button id="resetBtn" class="bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2 px-4 rounded-lg transition">شروع مجدد</button>
      <button id="chatBtn" class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg transition">چت</button>
    </div>
  </div>
  <!-- صفحه بازی -->
  <div class="flex-1 flex items-center justify-center p-4 relative bg-gradient-to-br from-gray-800 via-gray-900 to-gray-800">
    <div class="grid grid-cols-3 grid-rows-3 gap-4 w-full max-w-sm">
      <div class="cell bg-gray-700 rounded-lg shadow-md flex items-center justify-center text-4xl font-bold cursor-pointer hover:bg-gray-600" data-index="0"></div>
      <div class="cell bg-gray-700 rounded-lg shadow-md flex items-center justify-center text-4xl font-bold cursor-pointer hover:bg-gray-600" data-index="1"></div>
      <div class="cell bg-gray-700 rounded-lg shadow-md flex items-center justify-center text-4xl font-bold cursor-pointer hover:bg-gray-600" data-index="2"></div>
      <div class="cell bg-gray-700 rounded-lg shadow-md flex items-center justify-center text-4xl font-bold cursor-pointer hover:bg-gray-600" data-index="3"></div>
      <div class="cell bg-gray-700 rounded-lg shadow-md flex items-center justify-center text-4xl font-bold cursor-pointer hover:bg-gray-600" data-index="4"></div>
      <div class="cell bg-gray-700 rounded-lg shadow-md flex items-center justify-center text-4xl font-bold cursor-pointer hover:bg-gray-600" data-index="5"></div>
      <div class="cell bg-gray-700 rounded-lg shadow-md flex items-center justify-center text-4xl font-bold cursor-pointer hover:bg-gray-600" data-index="6"></div>
      <div class="cell bg-gray-700 rounded-lg shadow-md flex items-center justify-center text-4xl font-bold cursor-pointer hover:bg-gray-600" data-index="7"></div>
      <div class="cell bg-gray-700 rounded-lg shadow-md flex items-center justify-center text-4xl font-bold cursor-pointer hover:bg-gray-600" data-index="8"></div>
    </div>
    <!-- تایمر و امتیاز لحظه‌ای -->
    <div class="absolute top-4 right-4 bg-gray-900 bg-opacity-70 backdrop-blur-md rounded-xl p-2 text-white font-semibold shadow-lg" id="timerDisplay">زمان: 30</div>
  </div>
  <!-- سمت بازیکن O -->
  <div class="flex-1 flex flex-col items-center justify-start p-4 bg-gradient-to-tr from-pink-950 via-pink-800 to-pink-700 bg-opacity-70 backdrop-blur-lg">
    <div class="flex items-center mb-4 space-x-3">
      <img src="https://images.unsplash.com/photo-1511367461989-f85a21fda167?auto=format&fit=crop&w=100&q=80" alt="بازیکن O" class="w-16 h-16 rounded-full border-4 border-pink-400 shadow-lg transition-transform hover:scale-105">
      <div class="text-xl font-semibold text-white">بازیکن O</div>
    </div>
    <div id="playerO-score" class="text-3xl font-bold text-green-400 mb-2">امتیاز: 0</div>
    <div id="playerO-turn" class="text-lg text-gray-300 mb-4">نوبت است</div>
    <div class="w-full flex flex-col items-center space-y-2 mb-4">
      <button id="guestBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition">ورود مهمان</button>
      <button id="rankingBtn" class="bg-yellow-600 hover:bg-yellow-700 text-white font-semibold py-2 px-4 rounded-lg transition">رنکینگ دوستان</button>
    </div>
  </div>
</div>

<!-- بخش چت (پنهان‌ساز) -->
<div id="chatBox" class="fixed bottom-4 right-4 w-80 bg-gray-900 bg-opacity-80 backdrop-blur-lg rounded-xl p-4 shadow-lg hidden flex-col">
  <div class="flex justify-between items-center mb-2">
    <h2 class="text-lg font-semibold text-white">چت زنده</h2>
    <button id="closeChat" class="text-gray-300 hover:text-white">&times;</button>
  </div>
  <div class="flex-1 overflow-y-auto mb-2 max-h-48" id="chatMessages"></div>
  <div class="flex">
    <input type="text" id="chatInput" placeholder="پیام..." class="flex-1 p-2 rounded-l bg-gray-700 text-white focus:outline-none" />
    <button id="sendChat" class="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded-r">ارسال</button>
  </div>
</div>

<!-- اسکریپت‌ها و منطق بازی -->
<script>
  const cells = document.querySelectorAll('.cell');
  const currentPlayerDisplayX = document.getElementById('playerX-turn');
  const currentPlayerDisplayO = document.getElementById('playerO-turn');
  const scoreX = document.getElementById('playerX-score');
  const scoreO = document.getElementById('playerO-score');
  const timerDisplay = document.getElementById('timerDisplay');
  const resetBtn = document.getElementById('resetBtn');

  const chatBox = document.getElementById('chatBox');
  const chatMessages = document.getElementById('chatMessages');
  const chatInput = document.getElementById('chatInput');
  const sendChat = document.getElementById('sendChat');
  const closeChat = document.getElementById('closeChat');
  const chatBtn = document.getElementById('chatBtn');

  // دور بازی
  let board = Array(9).fill(null);
  let currentPlayer = 'X'; // 'X' یا 'O'
  let scores = { X:0, O:0 };
  let gameActive = true;
  let timer = 30; // ثانیه برای هر نوبت
  let timerInterval = null;
  let currentTurn = 'X';

  const winningCombos = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  function updateScores() {
    scoreX.textContent = 'امتیاز: ' + scores.X;
    scoreO.textContent = 'امتیاز: ' + scores.O;
  }

  function checkWin(player) {
    return winningCombos.some(c => c.every(i => board[i] === player));
  }

  function checkDraw() {
    return board.every(c => c !== null);
  }

  function startTimer() {
    timer = 30;
    timerDisplay.textContent = 'زمان: ' + timer;
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if(timer > 0){
        timer--;
        timerDisplay.textContent = 'زمان: ' + timer;
      } else {
        clearInterval(timerInterval);
        switchTurn();
      }
    }, 1000);
  }

  function switchTurn() {
    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    currentTurn = currentPlayer;
    updateTurnDisplay();
    startTimer();
  }

  function updateTurnDisplay() {
    if(currentPlayer === 'X') {
      currentPlayerDisplayX.textContent = 'نوبت: شما (X)';
      currentPlayerDisplayO.textContent = 'انتظار';
    } else {
      currentPlayerDisplayX.textContent = 'انتظار';
      currentPlayerDisplayO.textContent = 'نوبت: شما (O)';
    }
  }

  function handleCellClick(e) {
    if(!gameActive) return;
    const idx = e.target.dataset.index;
    if(board[idx]) return;
    board[idx] = currentPlayer;
    e.target.textContent = currentPlayer;

    if(checkWin(currentPlayer)) {
      // برنده اعلام کن
      alert(`بازیکن ${currentPlayer} برنده شد! 🎉`);
      scores[currentPlayer]++;
      updateScores();
      resetBoard();
      return;
    } else if(checkDraw()) {
      alert('بازی مساوی شد!');
      resetBoard();
      return;
    }

    switchTurn();
  }

  function resetBoard() {
    board = Array(9).fill(null);
    cells.forEach(c => c.textContent = '');
    gameActive = true;
    updateTurnDisplay();
    startTimer();
  }

  cells.forEach(c => c.addEventListener('click', handleCellClick));

  resetBtn.addEventListener('click', () => {
    resetBoard();
    scores = { X:0, O:0 };
    updateScores();
  });

  // ابتدای بازی
  updateScores();
  updateTurnDisplay();
  startTimer();

  // چت و بخش‌های مربوطه
  document.getElementById('chatBtn').addEventListener('click', ()=> {
    chatBox.classList.toggle('hidden');
  });
  document.getElementById('closeChat').addEventListener('click', ()=> {
    chatBox.classList.add('hidden');
  });
  document.getElementById('sendChat').addEventListener('click', ()=> {
    const msg = chatInput.value.trim();
    if(msg) {
      const div = document.createElement('div');
      div.className = 'text-white mb-1 text-sm';
      div.textContent = `شما: ${msg}`;
      chatMessages.appendChild(div);
      chatInput.value = '';
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
  });
</script>

</body>
</html>
