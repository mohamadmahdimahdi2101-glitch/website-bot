<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>من</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .glow {
      text-shadow: 0 6px 24px rgba(99, 102, 241, 0.25), 0 2px 6px rgba(0,0,0,0.25);
    }
    html, body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-700 via-violet-600 to-pink-500 flex items-center justify-center p-6">
  <main class="w-full max-w-4xl">
    <section class="bg-white/6 backdrop-blur-sm rounded-3xl shadow-2xl ring-1 ring-white/10 p-8 md:p-12 flex flex-col items-center">
      <h1 class="glow text-white font-extrabold leading-none text-[140px] sm:text-[180px] md:text-[220px] lg:text-[260px] tracking-tight transition-transform duration-500 transform hover:scale-105 select-none">من</h1>
      <p class="mt-4 text-sm text-white/80">صفحهٔ ساده‌ای که تنها یک کلمه نمایش می‌دهد</p>
    </section>

    <div class="mt-6 flex items-center justify-center gap-3 text-xs text-white/80">
      <button id="toggleTheme" class="px-3 py-1 bg-white/8 hover:bg-white/12 rounded-md ring-1 ring-white/10 transition">افکت روشن</button>
      <span class="opacity-80">— برای تعامل روی متن کلیک یا نگه دارید</span>
    </div>
  </main>

  <script>
    const heading = document.querySelector('h1');
    const btn = document.getElementById('toggleTheme');

    // Press/tap effect
    heading.addEventListener('pointerdown', () => {
      heading.style.transform = 'scale(.96) translateY(2px)';
    });
    ['pointerup','pointercancel','pointerleave'].forEach(ev => {
      heading.addEventListener(ev, () => {
        heading.style.transform = '';
      });
    });

    // Toggle a subtle glow theme
    let bright = true;
    btn.addEventListener('click', () => {
      bright = !bright;
      if (bright) {
        document.body.classList.remove('bg-gray-900');
        heading.classList.add('glow');
        btn.textContent = 'افکت روشن';
      } else {
        document.body.classList.add('bg-gray-900');
        heading.classList.remove('glow');
        btn.textContent = 'افکت خاموش';
      }
    });

    // Prevent text selection on double click
    heading.addEventListener('mousedown', (e) => e.preventDefault());
  </script>
</body>
</html>
