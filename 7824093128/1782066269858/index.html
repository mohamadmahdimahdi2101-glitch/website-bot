<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>سجاد عنی - فروشگاه عن</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font Sans-serif text-gray-800">
  <!-- هدر -->
  <header class="bg-teal-600 p-4 flex items-center justify-between shadow-lg">
    <div class="text-white font-bold text-xl">سجاد عنی</div>
    <nav class="space-x-4 text-white font-semibold">
      <a href="#" class="hover:underline">خانه</a>
      <a href="#" class="hover:underline">محصولات</a>
      <a href="#" class="hover:underline">درباره ما</a>
      <a href="#" class="hover:underline">تماس</a>
    </nav>
  </header>

  <!-- محتوا اصلی -->
  <main class="max-w-7xl mx-auto p-4">
    <!-- معرفی کوتاه -->
    <section class="text-center mb-8">
      <h1 class="text-4xl font-bold text-teal-700 mb-3">خوش آمدید به فروشگاه سجاد عنی</h1>
      <p class="text-lg text-gray-700">بهترین محصولات عن سنتی و با کیفیت را از ما تهیه کنید</p>
    </section>

    <!-- محصولات -->
    <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <!-- محصول ۱ -->
      <div class="bg-white rounded-lg shadow-lg overflow-hidden hover:scale-105 transform transition duration-300">
        <img src="https://images.unsplash.com/photo-1575863391488-34470882007f?auto=format&fit=crop&w=800&q=80" alt="عن سنتی" class="w-full h-48 object-cover"/>
        <div class="p-4 text-center">
          <h3 class="text-xl font-semibold mb-2 text-gray-800">عن سنتی شماره ۱</h3>
          <p class="text-lg font-bold text-teal-600 mb-4">۱۵۰,۰۰۰ تومان</p>
          <button class="bg-teal-600 text-white px-4 py-2 rounded hover:bg-teal-500 transition">افزودن به سبد</button>
        </div>
      </div>
      <!-- محصول ۲ -->
      <div class="bg-white rounded-lg shadow-lg overflow-hidden hover:scale-105 transform transition duration-300">
        <img src="https://images.unsplash.com/photo-1542317819-4ccf4d754dc2?auto=format&fit=crop&w=800&q=80" alt="عن طبیعی" class="w-full h-48 object-cover"/>
        <div class="p-4 text-center">
          <h3 class="text-xl font-semibold mb-2 text-gray-800">عن طبیعی شماره ۲</h3>
          <p class="text-lg font-bold text-teal-600 mb-4">۱۷۰,۰۰۰ تومان</p>
          <button class="bg-teal-600 text-white px-4 py-2 rounded hover:bg-teal-500 transition">افزودن به سبد</button>
        </div>
      </div>
      <!-- محصول ۳ -->
      <div class="bg-white rounded-lg shadow-lg overflow-hidden hover:scale-105 transform transition duration-300">
        <img src="https://images.unsplash.com/photo-1549924231-f129b911e442?auto=format&fit=crop&w=800&q=80" alt="عن ویژه" class="w-full h-48 object-cover"/>
        <div class="p-4 text-center">
          <h3 class="text-xl font-semibold mb-2 text-gray-800">عن ویژه شماره ۳</h3>
          <p class="text-lg font-bold text-teal-600 mb-4">۲۰۰,۰۰۰ تومان</p>
          <button class="bg-teal-600 text-white px-4 py-2 rounded hover:bg-teal-500 transition">افزودن به سبد</button>
        </div>
      </div>
    </section>
  </main>

  <!-- فوتر -->
  <footer class="bg-gray-800 text-white text-center p-4 mt-8">
    <p class="mb-2">تمام حقوق محفوظ است &copy; ۱۴۰۲</p>
    <div class="space-x-4">
      <a href="#" class="hover:underline text-teal-400">اینستاگرام</a>
      <a href="#" class="hover:underline text-teal-400">تلگرام</a>
      <a href="#" class="hover:underline text-teal-400">تماس با ما</a>
    </div>
  </footer>
</body>
</html>
